<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Tashana Zm</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }

    .error-container {
      text-align: center;
      max-width: 600px;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-code {
      font-size: 120px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
      animation: bounce 1s ease-in-out infinite alternate;
    }

    @keyframes bounce {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-10px);
      }
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
      font-weight: 600;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      opacity: 0.9;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 15px 35px;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      border: 2px solid white;
    }

    .btn-primary {
      background: white;
      color: #2c3e50;
    }

    .btn-primary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-secondary {
      background: transparent;
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .suggestions {
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .suggestions h3 {
      font-size: 1.2rem;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .suggestion-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .suggestion-links a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.8;
      transition: all 0.3s ease;
    }

    .suggestion-links a:hover {
      opacity: 1;
      transform: translateX(5px);
    }

    @media (max-width: 768px) {
      .error-code {
        font-size: 80px;
      }

      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }

      .btn {
        padding: 12px 28px;
        font-size: 1rem;
      }

      .button-group {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1>Oops! Page Not Found</h1>
    <p>
      The page you're looking for seems to have wandered off. It might have been moved, deleted, or perhaps it never existed.
    </p>

    <div class="button-group">
      <a href="index.html" class="btn btn-primary">Go to Homepage</a>
      <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
    </div>

    <div class="suggestions">
      <h3>Popular Pages:</h3>
      <div class="suggestion-links">
        <a href="event-host-details.html">→ Event Host</a>
        <a href="tv-presenter-details.html">→ TV Presenter</a>
        <a href="recording-artist-details.html">→ Recording Artist</a>
        <a href="commercial-editorial-details.html">→ Commercial & Editorial</a>
        <a href="academic-leadership-details.html">→ Academic Leadership</a>
      </div>
    </div>
  </div>
</body>
</html>
