<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Tashana Zm</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }

    .thank-you-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 60px 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      animation: scaleIn 0.5s ease-out 0.3s both;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }

    .checkmark svg {
      width: 50px;
      height: 50px;
      stroke: white;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: drawCheck 0.5s ease-out 0.5s both;
    }

    @keyframes drawCheck {
      0% {
        stroke-dasharray: 0, 100;
      }
      100% {
        stroke-dasharray: 100, 0;
      }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 20px;
      animation: fadeIn 0.8s ease-out 0.6s both;
    }

    p {
      font-size: 1.1rem;
      color: #555;
      line-height: 1.8;
      margin-bottom: 30px;
      animation: fadeIn 0.8s ease-out 0.8s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .btn-home {
      display: inline-block;
      padding: 15px 40px;
      background: linear-gradient(135deg, #3498db, #2c3e50);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
      animation: fadeIn 0.8s ease-out 1s both;
    }

    .btn-home:hover {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(52, 152, 219, 0.4);
      color: white;
    }

    .email-info {
      font-size: 0.9rem;
      color: #777;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
      animation: fadeIn 0.8s ease-out 1.2s both;
    }

    @media (max-width: 768px) {
      .thank-you-container {
        padding: 40px 30px;
      }

      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }

      .checkmark {
        width: 60px;
        height: 60px;
      }

      .checkmark svg {
        width: 40px;
        height: 40px;
      }

      .btn-home {
        padding: 12px 30px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="thank-you-container">
    <div class="checkmark">
      <svg viewBox="0 0 52 52">
        <polyline points="14 27 22 35 38 19" />
      </svg>
    </div>

    <h1>Thank You!</h1>

    <p>
      Your message has been successfully sent. I appreciate you taking the time to reach out and will get back to you as soon as possible.
    </p>

    <a href="index.html" class="btn-home">Return to Home</a>

    <div class="email-info">
      <p>Expected response time: Within 24-48 hours</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
